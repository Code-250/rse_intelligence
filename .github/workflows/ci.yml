name: CI
on: [pull_request]
jobs:
  backend:
    steps:
      - checkout
      - setup Python 3.14
      - pip install -r requirements.txt
      - ruff check .
      - black --check .
      - pytest --cov=. --cov-report=xml
      - upload coverage report
  mobile:
    steps:
      - checkout
      - setup Node 20
      - npm ci
      - npx tsc --noEmit
      - npx jest --coverage
      - npx expo export --platform all